<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClipBrain</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #1e1e1e;
      --surface: #262626;
      --surface-hover: #2a2a2a;
      --border: #333333;
      --border-hover: #444444;
      --text-primary: #dcddde;
      --text-secondary: #999999;
      --text-muted: #666666;
      --accent: #7f6df2;
      --green: #4ade80;
      --amber: #e5a84b;
      --mono: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
      --sans: 'Inter', -apple-system, system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #3a3a3a; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #4a4a4a; }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-logo { width: 22px; height: 22px; flex-shrink: 0; }

    .header-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
    }

    /* Search */
    .search-box { position: relative; width: 240px; }

    .search-input {
      width: 100%;
      padding: 7px 12px 7px 32px;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 6px;
      color: var(--text-primary);
      font-size: 13px;
      font-family: var(--sans);
      outline: none;
      transition: border-color 150ms ease, background 150ms ease;
    }

    .search-input::placeholder { color: var(--text-muted); }

    .search-input:focus {
      border-color: var(--border);
      background: var(--surface);
    }

    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }

    .search-clear {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 16px;
      display: none;
      line-height: 1;
      padding: 2px;
    }

    .search-clear.visible { display: block; }

    /* Stats line */
    .stats-line {
      color: var(--text-muted);
      font-size: 13px;
      margin-bottom: 28px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 24px;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0;
    }

    .tab {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 13px;
      font-family: var(--sans);
      font-weight: 400;
      cursor: pointer;
      padding: 6px 0 10px;
      position: relative;
      transition: color 150ms ease;
    }

    .tab:hover { color: var(--text-secondary); }

    .tab.active {
      color: var(--text-primary);
    }

    .tab.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--accent);
      border-radius: 1px;
    }

    /* Card list */
    .card-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 200ms ease;
      opacity: 0;
      transform: translateY(4px);
      animation: fadeIn 200ms ease forwards;
    }

    .card:hover { border-color: var(--border-hover); }

    @keyframes fadeIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
    }

    .card-info { flex: 1; min-width: 0; }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-meta {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 2px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .card-type {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .card-type.kindle { color: var(--amber); }
    .card-type.web { color: var(--green); }

    .card-chevron {
      color: var(--text-muted);
      transition: transform 200ms ease;
      flex-shrink: 0;
      margin-left: 12px;
    }

    .card.expanded .card-chevron { transform: rotate(90deg); }

    /* Card content (expanded) */
    .card-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 200ms ease;
    }

    .card-content-inner {
      padding: 0 20px 20px;
    }

    .card-content-inner .loading-text {
      color: var(--text-muted);
      font-size: 13px;
    }

    /* Highlights */
    .highlight {
      border-left: 2px solid var(--accent);
      padding: 8px 0 8px 16px;
      margin-bottom: 12px;
    }

    .highlight:last-child { margin-bottom: 0; }

    .highlight-text {
      font-size: 13px;
      font-weight: 400;
      color: var(--text-primary);
      line-height: 1.6;
    }

    .highlight-page {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* Notes */
    .note {
      border-left: 2px solid var(--amber);
      padding: 8px 0 8px 16px;
      margin-bottom: 12px;
    }

    .note:last-child { margin-bottom: 0; }

    .note-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--amber);
      margin-bottom: 2px;
    }

    .note-text {
      font-size: 13px;
      font-weight: 400;
      color: var(--text-primary);
      line-height: 1.6;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }

    .empty-state-text {
      font-size: 14px;
      margin-top: 12px;
    }

    /* Loading state */
    .loading-state {
      color: var(--text-muted);
      font-size: 13px;
      padding: 40px 0;
      text-align: center;
    }

    /* Status bar */
    .status-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 6px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      font-family: var(--mono);
      color: var(--text-muted);
      z-index: 100;
    }

    .status-bar-left {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      flex-shrink: 0;
    }

    .status-dot.connected { background: var(--green); }

    .status-bar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .sync-all-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-secondary);
      font-size: 11px;
      font-family: var(--mono);
      padding: 2px 8px;
      cursor: pointer;
      transition: border-color 150ms ease, color 150ms ease;
    }

    .sync-all-btn:hover {
      border-color: var(--border-hover);
      color: var(--text-primary);
    }

    .sync-all-btn:disabled {
      opacity: 0.5;
      cursor: default;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-brand">
        <svg class="header-logo" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <g stroke="#7f6df2" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
            <path d="M28 58 L28 30"/>
            <path d="M28 30 C28 14, 50 10, 50 26 C50 38, 36 40, 36 30 L36 44"/>
            <path d="M28 30 C28 10, 8 10, 8 28 C8 42, 22 44, 28 38"/>
            <path d="M18 22 C22 18, 28 20, 30 24" stroke-width="2.5" opacity="0.6"/>
          </g>
        </svg>
        <span class="header-title">ClipBrain</span>
      </div>
      <div class="search-box">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
        </svg>
        <input type="text" class="search-input" id="searchInput" placeholder="Search..." autocomplete="off">
        <button class="search-clear" id="searchClear" aria-label="Clear search">&times;</button>
      </div>
    </div>

    <div class="stats-line" id="statsLine">Loading...</div>

    <div class="tabs" id="tabs">
      <button class="tab active" data-filter="all">All</button>
      <button class="tab" data-filter="kindle">Books</button>
      <button class="tab" data-filter="web">Articles</button>
    </div>

    <div class="card-list" id="cardList">
      <div class="loading-state">Loading...</div>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-bar-left">
      <span class="status-dot" id="obsidianDot"></span>
      <span id="obsidianStatus">Obsidian: checking...</span>
    </div>
    <div class="status-bar-right">
      <button class="sync-all-btn" id="connectObsidianBtn" style="display:none;">Connect Obsidian</button>
      <button class="sync-all-btn" id="syncAllBtn" style="display:none;">Sync all</button>
    </div>
  </div>

  <!-- Obsidian connect modal -->
  <div id="obsidianModal" style="display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;">
    <div style="background:#262626;border:1px solid #333;border-radius:12px;padding:24px;max-width:460px;width:90%;margin:auto;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);">
      <h3 style="font-size:16px;font-weight:600;color:#dcddde;margin-bottom:12px;">Connect Obsidian Vault</h3>
      <p style="font-size:13px;color:#999;margin-bottom:16px;line-height:1.5;">Enter the path to your Obsidian vault folder. ClipBrain will create a <code style="background:#333;padding:2px 6px;border-radius:3px;font-size:12px;">ClipBrain/</code> folder inside it with all your captures as markdown files.</p>
      <input type="text" id="vaultPathInput" placeholder="/Users/you/Documents/Obsidian Vault" style="width:100%;padding:10px 12px;background:#1e1e1e;border:1px solid #333;border-radius:8px;color:#dcddde;font-size:13px;font-family:SF Mono,Fira Code,monospace;outline:none;margin-bottom:16px;" />
      <div style="display:flex;gap:8px;justify-content:flex-end;">
        <button id="modalCancel" style="padding:8px 16px;background:transparent;border:1px solid #333;color:#999;border-radius:6px;font-size:13px;cursor:pointer;">Cancel</button>
        <button id="modalConnect" style="padding:8px 16px;background:#7f6df2;border:none;color:#fff;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;">Connect</button>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const state = {
        items: [],
        filter: 'all',
        searchQuery: '',
        expandedSlugs: new Set(),
        contentCache: {},
        stats: null,
      };

      const $ = (sel) => document.querySelector(sel);
      const $$ = (sel) => document.querySelectorAll(sel);

      // Elements
      const statsLine = $('#statsLine');
      const cardList = $('#cardList');
      const searchInput = $('#searchInput');
      const searchClear = $('#searchClear');
      const tabs = $('#tabs');

      // Fetch helpers
      async function fetchJSON(url) {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();
      }

      // Parse markdown content into highlights and notes
      function parseContent(markdown) {
        const items = [];
        if (!markdown) return items;
        const lines = markdown.split('\n');
        let i = 0;
        // Skip frontmatter
        if (lines[0] && lines[0].trim() === '---') {
          i = 1;
          while (i < lines.length && lines[i].trim() !== '---') i++;
          i++; // skip closing ---
        }
        let currentItem = null;
        for (; i < lines.length; i++) {
          const line = lines[i];
          // Highlight: starts with >
          if (line.startsWith('> ')) {
            const text = line.slice(2).trim();
            if (text) {
              currentItem = { type: 'highlight', text, page: null };
              items.push(currentItem);
            }
            continue;
          }
          // Continuation of blockquote
          if (line.startsWith('>') && currentItem && currentItem.type === 'highlight') {
            const cont = line.slice(1).trim();
            if (cont) currentItem.text += ' ' + cont;
            continue;
          }
          // Page/location marker
          if (currentItem && currentItem.type === 'highlight' && /^[-\u2014]\s*(page|location|p\.|loc\.)/i.test(line.trim())) {
            currentItem.page = line.trim().replace(/^[-\u2014]\s*/, '');
            continue;
          }
          // Note: **Note:** or *Note:*
          if (/^\*{1,2}Note:?\*{1,2}/i.test(line.trim())) {
            const noteText = line.trim().replace(/^\*{1,2}Note:?\*{1,2}\s*/i, '');
            if (noteText) {
              currentItem = { type: 'note', text: noteText };
              items.push(currentItem);
            }
            continue;
          }
          // Standalone note line after a highlight (no > prefix, not empty, not a heading)
          if (currentItem && !line.startsWith('#') && line.trim() && !line.startsWith('>') && !/^[-\u2014]\s*(page|location|p\.|loc\.)/i.test(line.trim())) {
            // Could be a note if previous was a highlight
            if (currentItem.type === 'highlight' && currentItem.page !== null) {
              // Text after page marker is likely a note
              const noteItem = { type: 'note', text: line.trim() };
              items.push(noteItem);
              currentItem = noteItem;
              continue;
            }
          }
          if (!line.trim()) {
            currentItem = null;
          }
        }
        return items;
      }

      // Render stats
      function renderStats() {
        if (!state.stats) { statsLine.textContent = ''; return; }
        const parts = [];
        if (state.stats.books) parts.push(`${state.stats.books} book${state.stats.books !== 1 ? 's' : ''}`);
        if (state.stats.articles) parts.push(`${state.stats.articles} article${state.stats.articles !== 1 ? 's' : ''}`);
        if (state.stats.highlights) parts.push(`${state.stats.highlights} highlight${state.stats.highlights !== 1 ? 's' : ''}`);
        statsLine.textContent = parts.join(' \u00b7 ');
      }

      // Get filtered items
      function getFilteredItems() {
        let items = state.items;
        if (state.filter === 'kindle') {
          items = items.filter(it => it.slug && it.slug.startsWith('kindle/'));
        } else if (state.filter === 'web') {
          items = items.filter(it => it.slug && it.slug.startsWith('web/'));
        }
        return items;
      }

      // Render card list
      function renderCards(items) {
        if (!items || items.length === 0) {
          cardList.innerHTML = state.searchQuery
            ? '<div class="empty-state"><div class="empty-state-text">No results found</div></div>'
            : '<div class="empty-state"><div class="empty-state-text">No items yet</div></div>';
          return;
        }

        cardList.innerHTML = '';
        items.forEach((item, idx) => {
          const card = document.createElement('div');
          card.className = 'card';
          card.style.animationDelay = `${idx * 30}ms`;

          const isKindle = item.slug && item.slug.startsWith('kindle/');
          const typeLabel = isKindle ? 'kindle' : 'web';
          const typeClass = isKindle ? 'kindle' : 'web';

          const highlightCount = item.highlight_count || item.highlights || '';
          const metaParts = [];
          if (item.author) metaParts.push(item.author);
          if (highlightCount) metaParts.push(`${highlightCount} highlight${highlightCount !== 1 ? 's' : ''}`);

          card.innerHTML = `
            <div class="card-header">
              <div class="card-info">
                <div class="card-title">${escapeHTML(item.title || item.slug || 'Untitled')}</div>
                <div class="card-meta">
                  <span class="card-type ${typeClass}">${typeLabel}</span>
                  ${metaParts.length ? '<span>' + escapeHTML(metaParts.join(' \u00b7 ')) + '</span>' : ''}
                </div>
              </div>
              <svg class="card-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6"/>
              </svg>
            </div>
            <div class="card-content">
              <div class="card-content-inner"></div>
            </div>
          `;

          const slug = item.slug;
          const isExpanded = state.expandedSlugs.has(slug);
          if (isExpanded) {
            card.classList.add('expanded');
            const contentEl = card.querySelector('.card-content');
            const innerEl = card.querySelector('.card-content-inner');
            if (state.contentCache[slug]) {
              renderHighlights(innerEl, state.contentCache[slug]);
              // Set max-height after render
              requestAnimationFrame(() => {
                contentEl.style.maxHeight = contentEl.scrollHeight + 'px';
              });
            } else {
              innerEl.innerHTML = '<div class="loading-text">Loading...</div>';
              requestAnimationFrame(() => {
                contentEl.style.maxHeight = '40px';
              });
              loadContent(slug, innerEl, contentEl);
            }
          }

          card.querySelector('.card-header').addEventListener('click', () => {
            toggleCard(card, slug);
          });

          cardList.appendChild(card);
        });
      }

      // Load content for a slug
      async function loadContent(slug, innerEl, contentEl) {
        try {
          const data = await fetchJSON(`/api/page?slug=${encodeURIComponent(slug)}`);
          const parsed = parseContent(data.content);
          state.contentCache[slug] = parsed;
          renderHighlights(innerEl, parsed);
          contentEl.style.maxHeight = contentEl.scrollHeight + 'px';
        } catch (err) {
          innerEl.innerHTML = '<div class="loading-text">Failed to load</div>';
          contentEl.style.maxHeight = '40px';
        }
      }

      // Render highlights into element
      function renderHighlights(el, items) {
        if (!items || items.length === 0) {
          el.innerHTML = '<div class="loading-text">No highlights</div>';
          return;
        }
        el.innerHTML = items.map(item => {
          if (item.type === 'note') {
            return `<div class="note">
              <div class="note-label">Note</div>
              <div class="note-text">${escapeHTML(item.text)}</div>
            </div>`;
          }
          return `<div class="highlight">
            <div class="highlight-text">${escapeHTML(item.text)}</div>
            ${item.page ? `<div class="highlight-page">${escapeHTML(item.page)}</div>` : ''}
          </div>`;
        }).join('');
      }

      // Toggle card expand/collapse
      function toggleCard(card, slug) {
        const contentEl = card.querySelector('.card-content');
        const innerEl = card.querySelector('.card-content-inner');

        if (card.classList.contains('expanded')) {
          card.classList.remove('expanded');
          contentEl.style.maxHeight = '0';
          state.expandedSlugs.delete(slug);
        } else {
          card.classList.add('expanded');
          state.expandedSlugs.add(slug);

          if (state.contentCache[slug]) {
            renderHighlights(innerEl, state.contentCache[slug]);
            contentEl.style.maxHeight = contentEl.scrollHeight + 'px';
          } else {
            innerEl.innerHTML = '<div class="loading-text">Loading...</div>';
            contentEl.style.maxHeight = '40px';
            loadContent(slug, innerEl, contentEl);
          }
        }
      }

      // Escape HTML
      function escapeHTML(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      // Tab handling
      tabs.addEventListener('click', (e) => {
        if (!e.target.classList.contains('tab')) return;
        $$('.tab').forEach(t => t.classList.remove('active'));
        e.target.classList.add('active');
        state.filter = e.target.dataset.filter;
        renderCards(getFilteredItems());
      });

      // Search
      let searchTimeout;
      searchInput.addEventListener('input', () => {
        const q = searchInput.value.trim();
        searchClear.classList.toggle('visible', q.length > 0);

        clearTimeout(searchTimeout);
        if (!q) {
          state.searchQuery = '';
          renderCards(getFilteredItems());
          return;
        }
        searchTimeout = setTimeout(async () => {
          state.searchQuery = q;
          try {
            const data = await fetchJSON(`/api/search?q=${encodeURIComponent(q)}`);
            renderCards(data.results || []);
          } catch (err) {
            cardList.innerHTML = '<div class="empty-state"><div class="empty-state-text">Search failed</div></div>';
          }
        }, 300);
      });

      searchClear.addEventListener('click', () => {
        searchInput.value = '';
        searchClear.classList.remove('visible');
        state.searchQuery = '';
        renderCards(getFilteredItems());
        searchInput.focus();
      });

      // Initial load
      async function init() {
        try {
          const [statsData, recentData] = await Promise.all([
            fetchJSON('/api/stats'),
            fetchJSON('/api/recent?limit=200'),
          ]);

          state.stats = statsData;
          renderStats();

          const results = recentData.results || [];
          state.items = results;
          renderCards(getFilteredItems());

          // Auto-expand first 3 kindle books
          const kindleItems = results.filter(it => it.slug && it.slug.startsWith('kindle/'));
          const toExpand = kindleItems.slice(0, 3);
          for (const item of toExpand) {
            state.expandedSlugs.add(item.slug);
            // Pre-fetch content
            try {
              const data = await fetchJSON(`/api/page?slug=${encodeURIComponent(item.slug)}`);
              state.contentCache[item.slug] = parseContent(data.content);
            } catch (e) { /* ignore */ }
          }

          // Re-render with expanded cards
          if (toExpand.length > 0) {
            renderCards(getFilteredItems());
          }
        } catch (err) {
          statsLine.textContent = '';
          cardList.innerHTML = '<div class="empty-state"><div class="empty-state-text">Could not connect to server</div></div>';
        }
      }

      init();

      // Obsidian status bar
      const obsidianDot = $('#obsidianDot');
      const obsidianStatus = $('#obsidianStatus');
      const syncAllBtn = $('#syncAllBtn');
      const connectBtn = $('#connectObsidianBtn');
      const modal = document.getElementById('obsidianModal');
      const vaultInput = document.getElementById('vaultPathInput');

      async function loadObsidianStatus() {
        try {
          const config = await fetchJSON('/api/config');
          const obs = config.obsidian || {};
          if (obs.enabled && obs.vaultPath) {
            obsidianDot.classList.add('connected');
            const shortPath = obs.vaultPath.replace(/^\/Users\/[^/]+/, '~');
            obsidianStatus.textContent = `Obsidian: ${shortPath}/${obs.folder || 'ClipBrain'}`;
            syncAllBtn.style.display = '';
            connectBtn.style.display = 'none';
          } else {
            obsidianDot.classList.remove('connected');
            obsidianStatus.textContent = 'Obsidian: not connected';
            syncAllBtn.style.display = 'none';
            connectBtn.style.display = '';
          }
        } catch {
          obsidianDot.classList.remove('connected');
          obsidianStatus.textContent = 'Obsidian: not connected';
          syncAllBtn.style.display = 'none';
          connectBtn.style.display = '';
        }
      }

      // Connect Obsidian modal
      connectBtn.addEventListener('click', () => {
        modal.style.display = 'block';
        vaultInput.focus();
      });

      document.getElementById('modalCancel').addEventListener('click', () => {
        modal.style.display = 'none';
      });

      modal.addEventListener('click', (e) => {
        if (e.target === modal) modal.style.display = 'none';
      });

      document.getElementById('modalConnect').addEventListener('click', async () => {
        const path = vaultInput.value.trim();
        if (!path) return;

        const btn = document.getElementById('modalConnect');
        btn.textContent = 'Connecting...';
        btn.disabled = true;

        try {
          const res = await fetch('/api/config', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              obsidian: { enabled: true, vaultPath: path, folder: 'ClipBrain' }
            })
          });

          if (res.ok) {
            modal.style.display = 'none';
            // Sync all existing captures
            obsidianStatus.textContent = 'Syncing captures to Obsidian...';
            await fetch('/api/obsidian-sync-all', { method: 'POST' });
            loadObsidianStatus();
          } else {
            alert('Failed to save config');
          }
        } catch (err) {
          alert('Error: ' + err.message);
        }

        btn.textContent = 'Connect';
        btn.disabled = false;
      });

      // Sync all button
      syncAllBtn.addEventListener('click', async () => {
        syncAllBtn.disabled = true;
        syncAllBtn.textContent = 'Syncing...';
        try {
          const r = await fetch('/api/obsidian-sync-all', { method: 'POST' });
          const res = await r.json();
          syncAllBtn.textContent = `Done (${res.synced || 0})`;
          setTimeout(() => {
            syncAllBtn.textContent = 'Sync all';
            syncAllBtn.disabled = false;
          }, 3000);
        } catch {
          syncAllBtn.textContent = 'Failed';
          setTimeout(() => {
            syncAllBtn.textContent = 'Sync all';
            syncAllBtn.disabled = false;
          }, 3000);
        }
      });

      loadObsidianStatus();
    })();
  </script>
</body>
</html>
